<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pool-deep:#052c46;
    --pool-mid:#0e5c86;
    --pool-glow:#4fd8eb;
    --foam:#f5fbfd;
    --ink:#062338;
    --gold:#ffce54;
    --tiedye: conic-gradient(from 200deg, #ff5e7e, #ffce54, #4fd8eb, #7b61ff, #ff5e7e);
    --felt: linear-gradient(160deg,#f2a154,#c96a1e);
    --greek: linear-gradient(90deg,
      #ffffff 0%, #ffffff 7.69%, #2FEDBD 7.69%, #2FEDBD 15.38%,
      #ffffff 15.38%, #ffffff 23.08%, #2FEDBD 23.08%, #2FEDBD 30.77%,
      #ffffff 30.77%, #ffffff 38.46%, #2FEDBD 38.46%, #2FEDBD 46.15%,
      #ffffff 46.15%, #ffffff 53.85%, #2FEDBD 53.85%, #2FEDBD 61.54%,
      #ffffff 61.54%, #ffffff 69.23%, #2FEDBD 69.23%, #2FEDBD 76.92%,
      #ffffff 76.92%, #ffffff 84.62%, #2FEDBD 84.62%, #2FEDBD 92.31%,
      #ffffff 92.31%, #ffffff 100%);
    --dream: linear-gradient(160deg, rgb(255,238,247), rgb(255,205,231));
    --colorless: radial-gradient(circle at 30% 20%, #ffffff, #dff3fa 60%, #bfe9f5 100%);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Nunito', system-ui, sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(79,216,235,0.15), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(79,216,235,0.12), transparent 45%),
      linear-gradient(180deg, var(--pool-deep), var(--pool-mid));
    color:var(--foam);
    min-height:100vh;
    overflow-x:hidden;
  }
  .ripple-bg{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      repeating-radial-gradient(circle at 50% 120%, rgba(255,255,255,0.03) 0, rgba(255,255,255,0.03) 2px, transparent 3px, transparent 40px);
    animation: rippleMove 18s linear infinite;
  }
  @keyframes rippleMove{ from{ background-position:0 0;} to{ background-position:0 400px;} }
  @media (prefers-reduced-motion: reduce){ .ripple-bg{animation:none;} *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }

  #app{ position:relative; z-index:1; max-width:820px; margin:0 auto; padding:clamp(10px,3vw,28px); min-height:100vh; display:flex; flex-direction:column; }

  h1{ font-family:'Baloo 2', system-ui, sans-serif; font-weight:800; letter-spacing:0.5px; margin:0; }
  h2{ font-family:'Baloo 2', system-ui, sans-serif; font-weight:700; margin:0 0 12px; }

  button{ font-family:inherit; cursor:pointer; border:none; }
  button:focus-visible, input:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }

  /* ---------- START / HOME SCREEN ---------- */
  .start-screen{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:18px; padding:20px 0;}
  .start-screen h1{ font-size:clamp(2.2rem,7vw,3.4rem); background:linear-gradient(90deg,var(--pool-glow),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tagline{ font-size:1.05rem; opacity:0.85; max-width:480px; }
  .name-form{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:340px; }
  .name-form label{ text-align:left; font-weight:700; font-size:0.9rem; opacity:0.9; }
  .name-form input, .join-row input{
    padding:12px 14px; border-radius:14px; border:2px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.08); color:var(--foam); font-size:1rem; font-weight:600;
  }
  .name-form input::placeholder, .join-row input::placeholder{ color:rgba(245,251,253,0.5); }
  .start-btn{
    margin-top:6px; padding:14px 32px; border-radius:999px; font-size:1.15rem; font-weight:800;
    font-family:'Baloo 2', system-ui, sans-serif;
    background:linear-gradient(90deg,var(--pool-glow),#7ee8f5); color:var(--ink);
    box-shadow:0 6px 0 #1a8ba3, 0 10px 20px rgba(0,0,0,0.3);
  }
  .start-btn.small{ margin-top:0; padding:12px 20px; font-size:1rem; }
  .start-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #1a8ba3; }
  .join-row{ display:flex; gap:8px; align-items:stretch; width:100%; max-width:340px; }
  .join-row input{ flex:1; text-align:center; letter-spacing:0.35em; font-size:1.2rem; }
  .home-error{ color:#ffb454; font-weight:700; }
  .guide-toggle-link{ background:none; color:var(--pool-glow); text-decoration:underline; font-weight:700; font-size:0.95rem; }
  .code-display{ font-family:'Baloo 2',sans-serif; font-weight:800; font-size:clamp(2.6rem,12vw,4.2rem); letter-spacing:0.25em; color:var(--gold); background:rgba(255,255,255,0.06); border:2px dashed rgba(255,206,84,0.5); border-radius:18px; padding:12px 26px; }
  .player-list{ width:100%; max-width:520px; display:flex; flex-direction:column; gap:8px; }
  .player-chip{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 12px; border-radius:12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); font-weight:800; }
  .player-chip small{ opacity:0.78; font-weight:800; }
  .display-requests{ width:100%; max-width:560px; display:flex; flex-direction:column; gap:8px; margin:8px auto; }
  .display-request{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; padding:10px 12px; border-radius:12px; background:rgba(255,206,84,0.13); border:1px solid rgba(255,206,84,0.38); }
  .display-request-actions{ display:flex; gap:8px; }
  .display-request-actions button{ padding:7px 12px; border-radius:999px; font-weight:800; }
  .approve-btn{ background:var(--gold); color:var(--ink); }
  .reject-btn{ background:rgba(255,255,255,0.12); color:var(--foam); border:1px solid rgba(255,255,255,0.3); }
  .secondary-btn{ margin-top:0; padding:12px 18px; border-radius:999px; font-weight:800; background:rgba(255,255,255,0.12); color:var(--foam); border:1px solid rgba(255,255,255,0.25); }

  /* ---------- CARD GUIDE ---------- */
  .guide-panel{ background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:14px 16px; margin:12px 0; text-align:left; }
  .guide-panel h3{ margin:0 0 8px; font-family:'Baloo 2',sans-serif; }
  .guide-item{ display:flex; gap:10px; align-items:flex-start; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.08); }
  .guide-item:last-child{ border-bottom:none; }
  .guide-icon{ font-size:1.4rem; flex:0 0 auto; }
  .guide-text b{ display:block; }
  .guide-text span{ opacity:0.85; font-size:0.92rem; }
  .synchro-note{ margin-top:10px; padding-top:10px; border-top:1px dashed rgba(255,255,255,0.2); font-size:0.92rem; }

  /* ---------- GAME HEADER ---------- */
  .game-header{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:9px; }
  .game-header h1{ font-size:clamp(1.3rem,4vw,1.8rem); }
  .header-btns{ display:flex; gap:8px; }
  .header-btns button{
    padding:8px 14px; border-radius:999px; background:rgba(255,255,255,0.1); color:var(--foam);
    font-weight:700; font-size:0.85rem; border:1px solid rgba(255,255,255,0.25);
  }
  .header-btns button:hover{ background:rgba(255,255,255,0.2); }

  .turn-banner{
    text-align:center; font-family:'Baloo 2',sans-serif; font-weight:700; font-size:1.1rem;
    background:rgba(255,206,84,0.15); border:1px solid rgba(255,206,84,0.4); color:var(--gold);
    border-radius:999px; padding:6px 14px; margin:6px auto 12px; width:fit-content;
  }

  /* ---------- HAND ROWS ---------- */
  .hand-row{ padding:8px 6px; border-radius:18px; margin:4px 0; transition:background 0.2s; }
  .hand-row.compact{ padding:4px 6px; }
  .hand-row.compact .hand-header{ padding-bottom:0; }
  .hand-row.active{ background:rgba(79,216,235,0.08); box-shadow:0 0 0 2px rgba(79,216,235,0.35) inset; }
  .hand-row.away{ opacity:0.6; }
  .hand-row.inactive{ opacity:0.42; }
  .hand-header{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:2px 8px 6px; font-family:'Baloo 2',sans-serif; }
  .player-name{ font-weight:700; font-size:1.05rem; }
  .card-count{ font-size:0.85rem; opacity:0.75; background:rgba(255,255,255,0.08); padding:2px 9px; border-radius:999px; }
  .synchro-flag{ font-size:0.82rem; color:#ffb454; font-weight:700; }
  .away-badge{ font-size:0.78rem; color:#ff9db0; font-weight:700; }
  .host-badge{ font-size:0.76rem; color:var(--gold); font-weight:800; }
  .synchro-main-btn{ margin-left:auto; font-size:0.78rem; font-weight:800; padding:6px 14px; border-radius:999px; background:var(--gold); color:var(--ink); flex-shrink:0; }
  .synchro-main-btn:active{ transform:translateY(1px); }
  .pace-btn{ margin-left:8px; font-size:0.74rem; font-weight:800; padding:5px 12px; border-radius:999px; flex-shrink:0; }
  .pace-btn.nudge{ background:var(--pool-glow); color:var(--ink); }
  .pace-btn.skip{ background:#ff5e7e; color:#fff; }
  .pace-btn:active{ transform:translateY(1px); }

  .hand-cards{ display:flex; flex-wrap:wrap; gap:8px; padding:4px; min-height:96px; }
  .opponent-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; margin:4px 0 8px; }
  .opponent-grid .hand-row{ margin:0; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); }
  .display-screen{ flex:1; display:flex; flex-direction:column; gap:12px; }
  .display-screen .game-header h1{ font-size:clamp(1.6rem,5vw,2.5rem); }
  .display-roster{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; }

  .card{
    width:clamp(58px,13vw,78px); height:clamp(82px,18vw,110px); border-radius:12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    color:white; text-shadow:0 1px 3px rgba(0,0,0,0.45); font-weight:800;
    box-shadow:0 4px 8px rgba(0,0,0,0.35); border:2px solid rgba(255,255,255,0.35);
    transition:transform 0.12s ease; padding:4px; position:relative; overflow:hidden; z-index:0;
  }
  .card.tiedye{ background:#ffce54; }
  .card.tiedye::before{
    content:''; position:absolute; inset:-25%; z-index:-1;
    background:var(--tiedye);
    filter:url(#tieDyeWarp);
  }
  .card.felt{
    background:var(--felt);
    background-image: var(--felt),
      repeating-radial-gradient(circle at 0 0, rgba(255,255,255,0.08) 0, rgba(255,255,255,0.08) 1px, transparent 2px, transparent 6px);
    font-size:clamp(11.9px, 2.667vw, 16px);
  }
  .card.greek{ background:var(--greek); }
  .card.dream{
    background:var(--dream);
    font-size:clamp(11.9px, 2.667vw, 16px);
  }
  .card.colorless{
    background:var(--colorless); border-color:#9fd9ea;
    color:#0d3a52; text-shadow:none;
  }
  .card:not(.disabled){
    box-shadow:0 4px 8px rgba(0,0,0,0.35), 0 0 0 4px rgba(79,216,235,0.95), 0 0 22px 5px rgba(79,216,235,0.75);
  }
  .card:not(.disabled):hover{ transform:translateY(-6px) scale(1.04); cursor:pointer; }
  .card.disabled{ cursor:default; }
  .card-number{ font-size:clamp(1.4rem,4.5vw,2rem); font-family:'Baloo 2',sans-serif; }
  .card-icon{ font-size:clamp(1.3rem,4vw,1.7rem); }
  .card-name{ font-size:clamp(0.55rem,1.8vw,0.68rem); text-align:center; line-height:1.1; }

  /* ---------- FELT & GOOGLY FACE ---------- */
  .stitch{ position:absolute; inset:0.5em; border:2px dashed rgba(255,232,168,0.65); border-radius:0.6em; pointer-events:none; }
  .face{ position:absolute; top:0.9em; left:50%; transform:translateX(-50%); display:flex; gap:0.25em; }
  .eye{ width:1.25em; height:1.25em; background:white; border-radius:50%;
    box-shadow:inset -0.05em -0.05em 0 rgba(0,0,0,0.08), 0 0 0 0.06em rgba(0,0,0,0.15);
    display:flex; align-items:center; justify-content:center; animation:eyeBlink 5s ease-in-out infinite; }
  .eye::after{ content:''; width:0.5em; height:0.5em; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #555, #111 65%); }
  .eye.left{ transform:translateY(-0.19em) rotate(-6deg); }
  .eye.right{ transform:translateY(0.125em) rotate(8deg); }
  .card.blink-3s .eye{ animation-duration:3s; }
  .card.blink-4s .eye{ animation-duration:4s; }
  .card.blink-5s .eye{ animation-duration:5s; }
  .nose{ position:absolute; top:1.9em; left:50%; transform:translateX(-50%);
    width:1.05em; height:1.43em; background:rgba(255,255,255,0.24); border-radius:50%; }
  .mouth{ position:absolute; bottom:0.55em; left:50%; transform:translateX(-50%) rotate(6deg);
    width:3.6em; height:2.5em; overflow:hidden; background:#000;
    border-radius:50% 50% 50% 50% / 25% 25% 70% 70%; }
  .mouth-content{ display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:100%; height:100%; padding:0.1em 0.3em; transform:rotate(-6deg); }
  .mouth-number{ font-size:1.5em; font-family:'Baloo 2',sans-serif; color:#fff; }
  .mouth-icon{ font-size:1.05em; line-height:1; }
  .mouth-label{ font-size:0.55em; font-weight:800; text-align:center; line-height:1.15; color:#fff; margin-top:0.1em; }
  @keyframes eyeBlink{ 0%,90%,100%{transform:scaleY(1);} 91.5%{transform:scaleY(0.12);} 93%{transform:scaleY(1);} }
  @media (prefers-reduced-motion: reduce){ .eye{ animation:none; } }

  /* ---------- DREAMHOUSE DELUXE STARS ---------- */
  .glyph{ position:absolute; color:#fff; text-shadow:0 0 6px #fff, 0 0 10px #ffd9ef;
    animation:starTwinkle 4s ease-in-out infinite; }
  @keyframes starTwinkle{ 0%,90%,100%{opacity:1; transform:scale(1);} 91.5%{opacity:0.35; transform:scale(0.75);} 93%{opacity:1; transform:scale(1);} }
  .card.group-a .glyph{ animation-duration:3s; }
  .card.group-b .glyph{ animation-duration:4s; }
  .card.group-c .glyph{ animation-duration:5s; }
  .glyph.g1{ top:12%; left:18%; font-size:0.85em; animation-delay:0s; }
  .glyph.g2{ top:22%; left:68%; font-size:0.45em; animation-delay:0.35s; }
  .glyph.g3{ top:48%; left:85%; font-size:0.6em; animation-delay:0.7s; }
  .glyph.g4{ top:68%; left:22%; font-size:0.4em; animation-delay:1.05s; }
  .glyph.g5{ top:78%; left:58%; font-size:0.55em; animation-delay:1.4s; }
  .glyph.g6{ top:38%; left:42%; font-size:0.32em; animation-delay:1.75s; }
  .card.group-b .glyph.g1{ top:15%; left:55%; }
  .card.group-b .glyph.g2{ top:10%; left:20%; }
  .card.group-b .glyph.g3{ top:28%; left:82%; font-size:0.75em; }
  .card.group-b .glyph.g4{ top:55%; left:65%; }
  .card.group-b .glyph.g5{ top:62%; left:15%; }
  .card.group-b .glyph.g6{ top:82%; left:42%; }
  .card.group-c .glyph.g1{ top:10%; left:32%; font-size:0.5em; }
  .card.group-c .glyph.g2{ top:38%; left:10%; }
  .card.group-c .glyph.g3{ top:16%; left:76%; font-size:0.62em; }
  .card.group-c .glyph.g4{ top:65%; left:85%; }
  .card.group-c .glyph.g5{ top:55%; left:47%; }
  .card.group-c .glyph.g6{ top:85%; left:60%; }
  @media (prefers-reduced-motion: reduce){ .glyph{ animation:none; } }

  /* ---------- COLORLESS BUBBLES ---------- */
  .card.colorless::after{ content:''; position:absolute; inset:0; z-index:-1; }
  .card.bubble-a::after{
    background-image:
      radial-gradient(circle 4px at 20% 30%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 5px at 70% 65%, rgba(79,216,235,0.3), transparent),
      radial-gradient(circle 3px at 55% 22%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 4px at 82% 18%, rgba(79,216,235,0.25), transparent),
      radial-gradient(circle 3px at 30% 78%, rgba(79,216,235,0.25), transparent);
  }
  .card.bubble-b::after{
    background-image:
      radial-gradient(circle 4px at 15% 60%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 3px at 60% 15%, rgba(79,216,235,0.3), transparent),
      radial-gradient(circle 5px at 80% 50%, rgba(79,216,235,0.25), transparent),
      radial-gradient(circle 3px at 35% 85%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 4px at 68% 78%, rgba(79,216,235,0.25), transparent);
  }
  .card.bubble-c::after{
    background-image:
      radial-gradient(circle 5px at 25% 15%, rgba(79,216,235,0.3), transparent),
      radial-gradient(circle 3px at 75% 30%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 4px at 45% 60%, rgba(79,216,235,0.25), transparent),
      radial-gradient(circle 3px at 85% 75%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 4px at 15% 85%, rgba(79,216,235,0.25), transparent);
  }
  .card.bubble-d::after{
    background-image:
      radial-gradient(circle 3px at 40% 20%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 4px at 10% 45%, rgba(79,216,235,0.25), transparent),
      radial-gradient(circle 5px at 65% 40%, rgba(79,216,235,0.3), transparent),
      radial-gradient(circle 3px at 30% 70%, rgba(79,216,235,0.35), transparent),
      radial-gradient(circle 4px at 78% 85%, rgba(79,216,235,0.25), transparent);
  }

  /* ---------- TABLE ZONE ---------- */
  .table-zone{ display:flex; align-items:center; justify-content:center; gap:clamp(16px,6vw,50px); margin:10px 0; }
  .pile{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .pile-label{ font-size:0.8rem; opacity:0.8; font-weight:700; }
  .card-back{
    width:clamp(58px,13vw,78px); height:clamp(82px,18vw,110px); border-radius:12px;
    background:radial-gradient(circle at 50% 40%, var(--pool-mid), var(--pool-deep));
    border:2px solid var(--pool-glow); display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; box-shadow:0 4px 10px rgba(0,0,0,0.4); cursor:pointer;
  }
  .card-back:hover{ transform:translateY(-4px); }
  .card-back.static{ cursor:default; }
  .card-back.static:hover{ transform:none; }
  .card-back.glow-draw{
    box-shadow:0 4px 10px rgba(0,0,0,0.4), 0 0 0 4px rgba(79,216,235,0.95), 0 0 22px 5px rgba(79,216,235,0.75);
  }
  .theme-badge{
    display:inline-flex; align-items:center; justify-content:center;
    font-size:0.78rem; font-weight:800; color:white;
    padding:5px 14px; border-radius:999px; min-width:96px;
    border:2px solid rgba(255,255,255,0.4);
    text-shadow:0 1px 3px rgba(0,0,0,0.65), 0 1px 6px rgba(0,0,0,0.55);
  }
  .theme-badge.tiedye{ background:var(--tiedye); }
  .theme-badge.felt{ background:var(--felt); }
  .theme-badge.greek{ background:var(--greek); }
  .theme-badge.dream{ background:var(--dream); }

  .message-banner{ text-align:center; min-height:1.4em; font-weight:700; color:var(--gold); font-size:0.95rem; padding:4px 8px; }

  /* ---------- MODAL ---------- */
  .modal-overlay{ position:fixed; inset:0; background:rgba(2,15,25,0.78); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
  .modal-overlay.top-modal{ align-items:flex-start; padding-top:min(18vh,110px); background:rgba(2,15,25,0.45); }
  .modal-overlay.tap-through{ cursor:pointer; }

  .modal-box{ background:var(--pool-deep); border:2px solid var(--pool-glow); border-radius:20px; padding:20px; max-width:480px; width:100%; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
  .theme-options{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:10px; }
  .theme-choice{ padding:14px 12px; border-radius:14px; font-weight:800; color:white; text-shadow:0 1px 3px rgba(0,0,0,0.65), 0 1px 6px rgba(0,0,0,0.55); min-width:120px; border:2px solid rgba(255,255,255,0.3); }
  .theme-choice.tiedye{ background:var(--tiedye); }

  .modal-hand{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:10px; }
  .blind-note{ font-size:0.85rem; opacity:0.85; margin-top:-4px; }

  /* ---------- GAME OVER ---------- */
  .gameover-screen{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; }
  .gameover-screen h1{ font-size:clamp(1.8rem,6vw,2.6rem); color:var(--gold); }
  .gameover-btns{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .gameover-btns button{ padding:12px 24px; border-radius:999px; font-weight:800; font-family:'Baloo 2',sans-serif; }
  .play-again-btn{ background:linear-gradient(90deg,var(--pool-glow),#7ee8f5); color:var(--ink); box-shadow:0 5px 0 #1a8ba3; }
  .new-names-btn{ background:rgba(255,255,255,0.12); color:var(--foam); border:1px solid rgba(255,255,255,0.3); }

  footer.credit{ text-align:center; font-size:0.75rem; opacity:0.5; padding:14px 0 4px; }

  /* ---------- NEW-CARD GLOW ---------- */
  .glow-wrap{ display:inline-block; border-radius:12px; }
  .glow-wrap .card{ animation: newCardGlow 1.1s ease-in-out 2; }
  @keyframes newCardGlow{
    0%,100%{ box-shadow:0 4px 8px rgba(0,0,0,0.35); }
    50%{ box-shadow:0 4px 8px rgba(0,0,0,0.35), 0 0 0 3px rgba(255,206,84,0.55), 0 0 14px 3px rgba(255,206,84,0.4); }
  }
  @media (prefers-reduced-motion: reduce){ .glow-wrap .card{ animation:none; box-shadow:0 4px 8px rgba(0,0,0,0.35), 0 0 0 3px rgba(255,206,84,0.55); } }

  /* ---------- CONNECTION / TOASTS (online only) ---------- */
  .conn-screen{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px; }
  .conn-dot{ width:14px; height:14px; border-radius:50%; background:var(--pool-glow); animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:0.3; transform:scale(0.8);} 50%{opacity:1; transform:scale(1.1);} }
  .reconnect-banner{
    position:fixed; top:0; left:0; right:0; z-index:60; text-align:center;
    background:#ff5e7e; color:#fff; font-weight:800; font-size:0.9rem; padding:7px 10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.4);
  }
  .bench-banner{
    display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap;
    background:linear-gradient(90deg,var(--pool-glow),#7ee8f5); color:var(--ink);
    font-weight:800; padding:11px 14px; border-radius:14px; margin:0 0 12px;
  }
  .bench-banner button{
    padding:9px 20px; border-radius:999px; font-weight:800; font-family:'Baloo 2',sans-serif;
    background:var(--ink); color:var(--foam); box-shadow:0 4px 0 rgba(0,0,0,0.3);
  }
  #toasts{ position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:70;
    display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; width:min(92vw,460px); }
  .toast{
    background:rgba(5,44,70,0.96); border:1px solid var(--pool-glow); color:var(--foam);
    font-weight:700; font-size:0.92rem; padding:10px 16px; border-radius:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.45); opacity:0; transform:translateY(14px);
    transition:opacity 0.28s ease, transform 0.28s ease; max-width:100%; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateY(0); }
  @media (prefers-reduced-motion: reduce){ .conn-dot{animation:none;} .toast{transition:opacity 0.15s;} }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute;" aria-hidden="true">
  <defs>
    <filter id="tieDyeWarp" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.028" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
<div class="ripple-bg"></div>
<div id="app"></div>
<div id="toasts"></div>
<div id="overlay" style="display:none;"></div>

<script>
/* =====================================================================
   The client talks to whatever host served it: wss:// when loaded over
   https (e.g. Render), ws:// when loaded over http (e.g. localhost), and
   a localhost fallback if the file is opened directly from disk. Nothing
   to edit when you deploy.
   ===================================================================== */
const SERVER_URL = location.host
  ? ((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host)
  : 'ws://localhost:8080';

/* ============ DATA (shared with v1.5) ============ */
const THEMES = ['tiedye','felt','greek','dream'];
const THEME_LABELS = { tiedye:'Tie-Dye', felt:'Felt & Googly', greek:'Greek Island Dance Party', dream:'Dreamhouse Deluxe' };
const ACTION_LABELS = { skip:'Ballet Leg', drawTwo:'Tub', drawFour:'Tower', wild:'Blossom', swap:'Kip', steal:'Barracuda', twist:'Oyster' };
const ACTION_ICONS = { skip:'🩰', drawTwo:'🛁', drawFour:'🗼', wild:'🌸', swap:'🔄', steal:'🦈', twist:'🦪' };
const GUIDE = [
  {icon:'🩰', name:'Ballet Leg', desc:"Reverses the swim direction. With two swimmers, it acts like a skip."},
  {icon:'🛁', name:'Tub', desc:"Splashes 2 draw cards onto the next swimmer, then skips their turn."},
  {icon:'🗼', name:'Tower', desc:"Splashes 4 draw cards onto the next swimmer, skips their turn, and lets you pick the new theme."},
  {icon:'🌸', name:'Blossom', desc:"Pick a brand new theme. No drawing involved."},
  {icon:'🔄', name:'Kip', desc:"Trade one card with the next swimmer."},
  {icon:'🦈', name:'Barracuda', desc:"Skips the next swimmer."},
  {icon:'🦪', name:'Oyster', desc:"Splashes the swimmer or swimmers with the fewest cards. If you are tied for fewest, only the others in that tie get splashed."},
];

/* ============ CLIENT STATE (local only) ============ */
let ui = {
  status:'connecting',   // 'connecting' | 'online' | 'reconnecting' | 'offline'
  mode:'player',         // 'player' | 'display'
  displayPending:false,
  paused:false,
  identity:null,         // { seat, code, token }
  srv:null,              // last 'state' message from the server
  name:'', joinCode:'',
  homeError:'',
  showGuide:false,
  showLosers:false,
  kipStep:null,          // { ownCardId } while picking the second Kip card
  glow:[]                // card ids to glow briefly
};

/* ============ PERSISTENCE (survives reload / brief drops) ============ */
const SAVE_KEY = 'nms-session';
function saveSession(s){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(s)); }catch(e){} }
function loadSession(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

/* ============ NETWORK ============ */
let ws = null, reconnectTimer = null, reconnectAttempts = 0;

function connect(){
  ui.status = ui.identity ? 'reconnecting' : 'connecting';
  render();
  ws = new WebSocket(SERVER_URL);
  ws.onopen = function(){
    reconnectAttempts = 0;
    ui.status = 'online';
    if(ui.identity){ send({ type:'rejoin', code:ui.identity.code, token:ui.identity.token }); }
    else if(ui.mode === 'display' && !ui.srv){ send({ type:'request-display-latest' }); ui.displayPending = true; }
    render();
  };
  ws.onmessage = function(e){ let m; try{ m = JSON.parse(e.data); }catch(err){ return; } handle(m); };
  ws.onclose = function(){ ui.status = 'offline'; scheduleReconnect(); render(); };
  ws.onerror = function(){ /* onclose will follow and handle retry */ };
}
function scheduleReconnect(){
  if(reconnectTimer) return;
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts++), 8000);
  reconnectTimer = setTimeout(function(){ reconnectTimer = null; connect(); }, delay);
}
function send(obj){ if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

function handle(m){
  if(m.type === 'joined'){ ui.identity = { seat:m.seat, code:m.code, token:m.token }; saveSession(ui.identity); return; }
  if(m.type === 'display-pending'){ ui.mode = 'display'; ui.displayPending = true; ui.srv = { role:'display-pending', code:m.code, phase:'pending' }; render(); return; }
  if(m.type === 'display-joined'){ ui.mode = 'display'; ui.displayPending = false; clearSession(); ui.identity = null; return; }
  if(m.type === 'display-denied'){ ui.mode = 'player'; ui.displayPending = false; ui.srv = null; ui.homeError = 'The shared display request was not approved.'; render(); return; }
  if(m.type === 'state'){ onState(m); return; }
  if(m.type === 'error'){ onError(m.error || {}); return; }
}

function onState(m){
  ui.srv = m;
  ui.paused = false;
  if(m.role === 'display'){ ui.mode = 'display'; ui.displayPending = false; clearSession(); ui.identity = null; }
  else ui.mode = 'player';
  if(m.game){
    (m.game.events || []).forEach(function(ev){ const t = eventText(ev); if(t) toast(t); });
    if(m.game.publicResult) processPublicResult(m.game.publicResult);
    if(m.game.yourResult) processResult(m.game.yourResult);
  }
  render();
}

function onError(err){
  const code = err.code;
  if(ui.mode === 'display'){
    ui.displayPending = false; ui.mode = 'player'; ui.srv = null;
    ui.homeError = friendly(code);
    render(); return;
  }
  if(ui.identity && (code === 'no-such-room' || code === 'bad-token')){
    // Our seat could not be resumed (server restarted, or the game already ended).
    clearSession(); ui.identity = null; ui.srv = null; ui.kipStep = null;
    ui.homeError = 'That game has ended. Start a fresh one below.';
    render(); return;
  }
  if(!ui.srv || ui.srv.phase !== 'playing'){ ui.homeError = friendly(code); render(); return; }
  toast(friendly(code));
}

function friendly(code){
  switch(code){
    case 'no-such-room': return 'No room with that code.';
    case 'already-started': return 'That game has already started.';
    case 'room-full': return 'That room is full.';
    case 'no-active-room': return 'No active room is waiting for a shared display.';
    case 'not-host': return 'Only the room host can do that.';
    case 'not-enough-players': return 'At least two swimmers need to join first.';
    case 'not-your-turn': return "Hold on, it's not your turn.";
    case 'must-play': return 'You have a playable card, so you cannot draw.';
    case 'illegal-play': return "That card doesn't match.";
    default: return 'Something went sideways. Try again.';
  }
}

/* ============ ACTION SENDERS (wired to card / button clicks) ============ */
function handleCardClick(id){ send({ type:'play-card', cardId:id }); }
function doDraw(){ send({ type:'draw-card' }); }
function doChooseTheme(t){ send({ type:'choose-theme', theme:t }); }
function doKipPickOwn(id){ ui.kipStep = { ownCardId:id }; render(); }
function doKipPickIndex(i){ send({ type:'resolve-kip', ownCardId:ui.kipStep.ownCardId, targetIndex:i }); ui.kipStep = null; }
function doStealPickIndex(i){ send({ type:'resolve-steal', targetIndex:i }); }
function doSynchro(){ send({ type:'synchro' }); }
function doCreate(){ const n = valOf('nm'); ui.name = n; ui.homeError=''; send({ type:'create-room', name:n }); }
function doStartGame(){ send({ type:'start-game' }); }
function doRematchReady(){ send({ type:'rematch-ready' }); }
function doRematchWait(){ send({ type:'rematch-wait' }); }
function doRematchPropose(){ send({ type:'rematch-propose' }); }
function doRematchCommit(){ send({ type:'rematch-commit' }); }
function doImBack(){ send({ type:'im-back' }); }
function doNudge(){ send({ type:'nudge' }); }
function doSkip(){ send({ type:'skip' }); }
function doJoin(){
  const n = valOf('nm'), c = valOf('cd'); ui.name = n; ui.joinCode = c; ui.homeError='';
  if(!/^\d{4}$/.test(c)){ ui.homeError = 'Enter the 4-digit room code.'; render(); return; }
  send({ type:'join-room', code:c, name:n });
}
function doRequestDisplay(){
  ui.mode = 'display'; ui.displayPending = true; ui.identity = null; clearSession(); ui.homeError='';
  send({ type:'request-display-latest' }); render();
}
function doApproveDisplay(id){ send({ type:'approve-display', requestId:id }); }
function doRejectDisplay(id){ send({ type:'reject-display', requestId:id }); }
function leaveGame(){
  if(ui.srv && ui.srv.phase === 'playing' && ui.identity){
    if(!confirm('Step away from this hand? You can rejoin from this device, but your seat may be skipped if you stay away too long.')) return;
    ui.paused = true; ui.srv = null; ui.kipStep = null; ui.homeError=''; ui.showLosers = false; ui.status = 'offline';
    if(ws){ ws.onclose = null; try{ ws.close(); }catch(e){} ws = null; }
    if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
    reconnectAttempts = 0;
    render();
    return;
  }
  clearSession(); ui.mode = 'player'; ui.displayPending = false; ui.paused = false; ui.identity = null; ui.srv = null; ui.kipStep = null; ui.homeError=''; ui.showLosers = false;
  if(ws){ ws.onclose = null; try{ ws.close(); }catch(e){} }
  if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
  reconnectAttempts = 0;
  connect();
}
function rejoinPausedGame(){ ui.paused = false; connect(); }
function toggleGuide(){ ui.showGuide = !ui.showGuide; render(); }

/* ============ TOASTS / GLOW / INFO (live, non-blocking) ============ */
function toast(text){
  const box = document.getElementById('toasts'); if(!box) return;
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = text;
  box.appendChild(el);
  requestAnimationFrame(function(){ el.classList.add('show'); });
  setTimeout(function(){ el.classList.remove('show'); setTimeout(function(){ el.remove(); }, 400); }, 3200);
}
let glowTimer = null;
function setGlow(ids){
  ui.glow = ids.slice(); render();
  if(glowTimer) clearTimeout(glowTimer);
  glowTimer = setTimeout(function(){ ui.glow = []; render(); }, 2400);
}
function showInfo(title, body){
  const box = document.getElementById('overlay'); if(!box) return;
  box.innerHTML = '<div class="modal-overlay tap-through"><div class="modal-box"><h2>' + escapeHtml(title) + '</h2><p class="tagline">' + escapeHtml(body) + '</p></div></div>';
  box.style.display = 'block';
  box.onclick = function(){ box.style.display = 'none'; box.innerHTML = ''; box.onclick = null; };
}
function processResult(r){
  switch(r.type){
    case 'draw': if(r.drew) setGlow([r.drew.id]); break;
    case 'reverse': toast('Ballet Leg reversed direction.'); break;
    case 'skip': toast((r.source || 'That card') + ' skipped ' + playerName(ui.srv, r.skipped) + '.'); break;
    case 'synchro-caught': {
      const caught = r.caught && r.caught.length ? r.caught.map(function(c){ return c.name; }).join(', ') : 'them';
      toast('Caught ' + caught + '!');
      break;
    }
    case 'oyster-self': toast('🦪 Oyster flipped on you, drew 2!'); break;
    case 'oyster-hit': {
      const hit = r.hits && r.hits.length ? r.hits.map(function(h){ return h.name; }).join(', ') : 'nobody';
      toast('Oyster splashed ' + hit + '.');
      break;
    }
    case 'kip': toast('🔄 Kip! You gave ' + cardLabel(r.gaveAway) + ', got ' + cardLabel(r.received) + '.'); if(r.received) setGlow([r.received.id]); break;
    case 'barracuda': toast('🦈 You snatched ' + cardLabel(r.got) + '!'); if(r.got) setGlow([r.got.id]); break;
    case 'synchro-declared': toast('🏊 You called Synchro!'); break;
    case 'synchro-caught': toast('🎯 Caught them! They drew 2.'); break;
    case 'synchro-warned': showInfo("That's the Synchro button!", "Tap it when you're down to your last card, or to catch your opponent if they forget. Any other time it costs you a card."); break;
    case 'synchro-penalty': showInfo('Not the right moment!', 'Nobody needs Synchro right now, so that cost you a card.'); break;
  }
}
function processPublicResult(r){
  switch(r.type){
    case 'theme-changed': {
      const theme = THEME_LABELS[r.theme] || r.theme;
      const source = r.source ? (' with ' + r.source) : '';
      toast(r.byName + ' changed the theme to ' + theme + source + '.');
      break;
    }
    case 'draw': {
      toast((r.byName || 'A swimmer') + ' drew a card.');
      break;
    }
    case 'rematch-ready': {
      toast((r.byName || 'A swimmer') + ' is in!');
      break;
    }
    case 'nudged': {
      toast('\ud83d\udc46 ' + (r.byName || 'A swimmer') + ' nudged you \u2014 your move!');
      break;
    }
    case 'you-nudged': {
      toast('Nudged ' + (r.targetName || 'them') + '.');
      break;
    }
    case 'skipped': {
      toast((r.byName || 'A swimmer') + ' was skipped.');
      break;
    }
    case 'skipped-you': {
      toast('You were skipped. Tap \u201cI\u2019m back!\u201d to jump back in.');
      break;
    }
  }
}
function eventText(ev){
  switch(ev.kind){
    case 'skip': return (ev.source || 'That card') + ' skipped your turn!';
    case 'ballet': return ev.count > 1 ? ('🩰 Ballet Leg froze you ' + ev.count + ' times!') : '🩰 Ballet Leg froze you!';
    case 'draw': { const src = ev.sources.map(function(s){ return s.source; }).join(', '); return '🌊 ' + src + ' splashed you, drew ' + ev.count + '!'; }
    case 'kip': return '🔄 Kip! You gave ' + cardLabel(ev.gaveAway) + ' and got ' + cardLabel(ev.received) + '.';
    case 'barracuda': return '🦈 Barracuda! It took your ' + cardLabel(ev.takenFromYou) + '.';
    case 'synchro-declared': return '🏊 ' + ev.by + ' called Synchro!';
    default: return '';
  }
}
function cardLabel(c){
  if(!c) return 'a card';
  if(c.type === 'number') return c.value + ' (' + THEME_LABELS[c.theme] + ')';
  return ACTION_LABELS[c.type];
}

/* ============ HELPERS ============ */
function valOf(id){ const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(ch){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]; }); }
function escapeAttr(s){ return escapeHtml(s); }
function clientPlayable(g, card){
  if(card.theme === null) return true;
  if(card.theme === g.theme) return true;
  if(card.type === 'number' && g.discardTop.type === 'number' && card.value === g.number) return true;
  if(card.type !== 'number' && card.type === g.discardTop.type) return true;
  return false;
}
function myPlayable(g){ return g.hand.some(function(c){ return clientPlayable(g, c); }); }
function mustDraw(g){ return g.yourTurn && !g.choice && !myPlayable(g); }
function playerBySeat(s, seat){ return s && s.players ? s.players.find(function(x){ return x.seat === seat; }) : null; }
function playerName(s, seat){ const p = playerBySeat(s, seat); return p ? p.name : 'that swimmer'; }
// Two-player convenience used by the parked renderGameOver: the one seat that isn't you.
function opponentName(s){
  if(!s || !s.players || !s.you) return 'the other swimmer';
  const opp = s.players.find(function(p){ return p.seat !== s.you.seat; });
  return opp ? opp.name : 'the other swimmer';
}
function winnerName(s, g){ return g && g.winner !== null && g.winner !== undefined ? playerName(s, g.winner) : 'Someone'; }
function choiceTarget(g){ return g.choiceTarget || (g.opponents && g.opponents[0]) || null; }
function statusBadges(p){
  return (p.host ? '<span class="host-badge">host</span>' : '') +
    (p.active === false ? '<span class="away-badge">skipped</span>' : (!p.present ? '<span class="away-badge">away...</span>' : ''));
}
function renderDisplayRequests(s){
  if(!s || !s.isHost || !s.displayRequests || !s.displayRequests.length) return '';
  return '<div class="display-requests">' + s.displayRequests.map(function(r){
    return '<div class="display-request"><b>Shared display wants to join</b><div class="display-request-actions">' +
      '<button class="approve-btn" onclick="doApproveDisplay(\'' + escapeAttr(r.id) + '\')">Approve</button>' +
      '<button class="reject-btn" onclick="doRejectDisplay(\'' + escapeAttr(r.id) + '\')">No</button>' +
      '</div></div>';
  }).join('') + '</div>';
}

/* ============ CARD RENDERING (identical to v1.5) ============ */
function valueTier(card){ if(card.type !== 'number') return 'action'; return card.value >= 5 ? 'mid' : 'low'; }
function renderCard(card, clickable, customOnClick){
  const onclickAttr = clickable ? ('onclick="' + (customOnClick || ('handleCardClick(' + card.id + ')')) + '"') : '';
  const theme = card.theme;
  if(theme === 'felt'){
    const tier = valueTier(card);
    const blinkClass = tier === 'action' ? 'blink-3s' : (tier === 'mid' ? 'blink-4s' : 'blink-5s');
    const cls = 'card felt ' + blinkClass + (clickable ? '' : ' disabled');
    const content = card.type === 'number'
      ? '<div class="mouth-content"><div class="mouth-number">' + card.value + '</div></div>'
      : '<div class="mouth-content"><div class="mouth-icon">' + ACTION_ICONS[card.type] + '</div><div class="mouth-label">' + ACTION_LABELS[card.type] + '</div></div>';
    return '<button class="' + cls + '" ' + onclickAttr + '><div class="stitch"></div><div class="face"><div class="eye left"></div><div class="eye right"></div></div><div class="nose"></div><div class="mouth">' + content + '</div></button>';
  }
  if(theme === 'dream'){
    const tier = valueTier(card);
    const groupClass = tier === 'action' ? 'group-a' : (tier === 'mid' ? 'group-b' : 'group-c');
    const cls = 'card dream ' + groupClass + (clickable ? '' : ' disabled');
    const glyphs = '<span class="glyph g1">✦</span><span class="glyph g2">✦</span><span class="glyph g3">✦</span><span class="glyph g4">✦</span><span class="glyph g5">✦</span><span class="glyph g6">✦</span>';
    const content = card.type === 'number'
      ? '<div class="card-number">' + card.value + '</div>'
      : '<div class="card-icon">' + ACTION_ICONS[card.type] + '</div><div class="card-name">' + ACTION_LABELS[card.type] + '</div>';
    return '<button class="' + cls + '" ' + onclickAttr + '>' + glyphs + content + '</button>';
  }
  if(theme === null){
    const bubbleMap = { wild:'bubble-a', swap:'bubble-b', steal:'bubble-c', twist:'bubble-d' };
    const cls = 'card colorless ' + bubbleMap[card.type] + (clickable ? '' : ' disabled');
    const content = '<div class="card-icon">' + ACTION_ICONS[card.type] + '</div><div class="card-name">' + ACTION_LABELS[card.type] + '</div>';
    return '<button class="' + cls + '" ' + onclickAttr + '>' + content + '</button>';
  }
  const cls = 'card ' + theme + (clickable ? '' : ' disabled');
  const inner = card.type === 'number'
    ? '<div class="card-number">' + card.value + '</div>'
    : '<div class="card-icon">' + ACTION_ICONS[card.type] + '</div><div class="card-name">' + ACTION_LABELS[card.type] + '</div>';
  return '<button class="' + cls + '" ' + onclickAttr + '>' + inner + '</button>';
}
function renderHiddenCard(clickable, onClick){
  const onclickAttr = clickable ? ('onclick="' + onClick + '"') : '';
  const cls = 'card-back' + (clickable ? '' : ' static');
  return '<div class="' + cls + '" ' + onclickAttr + '>🏊</div>';
}
function renderGuidePanel(){
  return '<div class="guide-panel"><h3>Special Cards</h3>' +
    GUIDE.map(function(g){ return '<div class="guide-item"><div class="guide-icon">' + g.icon + '</div><div class="guide-text"><b>' + g.name + '</b><span>' + g.desc + '</span></div></div>'; }).join('') +
    '<div class="synchro-note">🏊 Down to your last card? Tap <b>Synchro</b> before another swimmer catches you, or draw 2.</div></div>';
}

/* ============ SCREENS ============ */
function renderConnecting(){
  const label = ui.status === 'reconnecting' ? 'Reconnecting to your game...' : 'Diving into the pool...';
  return '<div class="conn-screen"><div class="conn-dot"></div><p class="tagline">' + label + '</p></div>';
}
function renderPaused(){
  return '<div class="start-screen"><h1>Seat Saved</h1>' +
    '<p class="tagline">You stepped away from room ' + escapeHtml(ui.identity ? ui.identity.code : '') + '. Rejoin from this device before the grace timer runs out.</p>' +
    '<button class="start-btn" onclick="rejoinPausedGame()">Rejoin Hand</button>' +
    '<button class="new-names-btn" onclick="leaveGame()">Back to Start</button></div>';
}
function renderHome(){
  return '<div class="start-screen"><h1>No Mercy Synchro</h1>' +
    '<p class="tagline">Online, hidden hands, no mercy. One screen each.</p>' +
    (ui.homeError ? '<p class="home-error">' + escapeHtml(ui.homeError) + '</p>' : '') +
    '<div class="name-form"><label for="nm">Your swimmer name</label>' +
    '<input id="nm" placeholder="You" maxlength="16" value="' + escapeAttr(ui.name) + '"></div>' +
    '<button class="start-btn" onclick="doCreate()">Create a Room 🌊</button>' +
    '<div class="join-row"><input id="cd" placeholder="code" maxlength="4" inputmode="numeric" value="' + escapeAttr(ui.joinCode) + '">' +
    '<button class="start-btn small" onclick="doJoin()">Join</button></div>' +
    '<button class="secondary-btn" onclick="doRequestDisplay()">Open Shared Display</button>' +
    '<button class="guide-toggle-link" onclick="toggleGuide()">' + (ui.showGuide ? 'Hide' : 'Show') + ' the card guide</button>' +
    (ui.showGuide ? renderGuidePanel() : '') + '</div>';
}
function renderWaiting(){
  const s = ui.srv;
  const roster = '<div class="player-list">' + s.players.map(function(p){
    return '<div class="player-chip"><span>' + escapeHtml(p.name) + '</span><small>' +
      (p.host ? 'host' : 'joined') + '</small></div>';
  }).join('') + '</div>';
  const start = s.isHost
    ? (s.canStart
      ? '<button class="start-btn" onclick="doStartGame()">Start Game</button>'
      : '<p class="tagline">Waiting for at least one more swimmer.</p>')
    : '<p class="tagline">Waiting for the host to start.</p>';
  return '<div class="start-screen"><h1>Room Ready</h1>' +
    '<p class="tagline">Share this code with the swimmers joining as players:</p>' +
    '<div class="code-display">' + escapeHtml(s.code) + '</div>' +
    roster + renderDisplayRequests(s) + start +
    '<button class="new-names-btn" onclick="leaveGame()">Cancel</button></div>';
}
function renderChoiceModal(g){
  const target = choiceTarget(g);
  if(g.choice === 'theme'){
    const isTower = g.discardTop && g.discardTop.type === 'drawFour';
    const title = isTower ? ('Tower! Pick the new theme (' + escapeHtml(target ? target.name : 'the next swimmer') + ' draws 4)') : 'Blossom! Pick the new theme';
    return '<div class="modal-overlay top-modal"><div class="modal-box"><h2>' + title + '</h2><div class="theme-options">' +
      THEMES.map(function(t){ return '<button class="theme-choice ' + t + '" onclick="doChooseTheme(\'' + t + '\')">' + THEME_LABELS[t] + '</button>'; }).join('') +
      '</div></div></div>';
  }
  if(g.choice === 'kip'){
    if(!ui.kipStep){
      return '<div class="modal-overlay"><div class="modal-box"><h2>Kip! Pick one of your cards to trade away</h2><div class="modal-hand">' +
        g.hand.map(function(c){ return renderCard(c, true, 'doKipPickOwn(' + c.id + ')'); }).join('') + '</div></div></div>';
    }
    const n = target ? target.cardCount : 0;
    return '<div class="modal-overlay"><div class="modal-box"><h2>Now grab a card from ' + escapeHtml(target ? target.name : 'the next swimmer') + '</h2><p class="blind-note">No peeking, pick blind!</p><div class="modal-hand">' +
      Array.from({length:n}).map(function(_, i){ return renderHiddenCard(true, 'doKipPickIndex(' + i + ')'); }).join('') + '</div></div></div>';
  }
  if(g.choice === 'steal'){
    const n = target ? target.cardCount : 0;
    return '<div class="modal-overlay"><div class="modal-box"><h2>Barracuda! Snatch a card from ' + escapeHtml(target ? target.name : 'the next swimmer') + '</h2><p class="blind-note">No peeking, pick blind!</p><div class="modal-hand">' +
      Array.from({length:n}).map(function(_, i){ return renderHiddenCard(true, 'doStealPickIndex(' + i + ')'); }).join('') + '</div></div></div>';
  }
  return '';
}
function renderGame(){
  const s = ui.srv, g = s.game;
  const opp = g.opponents[0];
  const oppRow = s.players.find(function(p){ return p.seat === opp.seat; }) || { present:true };
  const yourTurn = g.yourTurn;
  const banner = g.waitingOn ? (escapeHtml(opp.name) + ' is choosing...') : (yourTurn ? 'Your turn' : (escapeHtml(opp.name) + "'s turn"));
  const handHtml = g.hand.map(function(c){
    const clickable = yourTurn && !g.choice && clientPlayable(g, c);
    const html = renderCard(c, clickable);
    return ui.glow.indexOf(c.id) !== -1 ? ('<span class="glow-wrap">' + html + '</span>') : html;
  }).join('');
  return (ui.status !== 'online' ? '<div class="reconnect-banner">Connection lost. Reconnecting...</div>' : '') +
    '<div class="game-header"><h1>No Mercy Synchro</h1><div class="header-btns">' +
    '<button onclick="toggleGuide()">📖 Guide</button><button onclick="leaveGame()">🚪 Leave</button></div></div>' +
    (ui.showGuide ? renderGuidePanel() : '') +
    '<div class="turn-banner">' + banner + '</div>' +
    '<div class="hand-row compact' + (oppRow.present ? '' : ' away') + '"><div class="hand-header">' +
    '<span class="player-name">' + escapeHtml(opp.name) + '</span>' +
    '<span class="card-count">' + opp.cardCount + ' card' + (opp.cardCount === 1 ? '' : 's') + '</span>' +
    (oppRow.present ? '' : '<span class="away-badge">away…</span>') +
    '<button class="synchro-main-btn" onclick="doSynchro()">🏊 Synchro</button></div></div>' +
    '<div class="table-zone"><div class="pile"><div class="card-back ' + (mustDraw(g) ? 'glow-draw' : '') + '" onclick="doDraw()">🏊</div><div class="pile-label">Draw</div></div>' +
    '<div class="pile">' + renderCard(g.discardTop, false) + '<div class="theme-badge ' + g.theme + '">' + THEME_LABELS[g.theme] + '</div></div></div>' +
    '<div class="message-banner">' + (mustDraw(g) ? 'No cards to play, tap the draw pile.' : (oppRow.present ? '' : escapeHtml(opp.name) + ' dropped, waiting for them to reconnect...')) + '</div>' +
    '<div class="hand-row active"><div class="hand-header">' +
    '<span class="player-name">' + escapeHtml(s.you.name) + ' (you)</span>' +
    '<span class="card-count">' + g.hand.length + ' card' + (g.hand.length === 1 ? '' : 's') + '</span>' +
    '</div><div class="hand-cards">' + handHtml + '</div></div>' +
    (g.choice ? renderChoiceModal(g) : '');
}
function renderOpponentRows(s, g){
  if(!g.opponents || !g.opponents.length) return '';
  const pacing = s.pacing || {};
  return '<div class="opponent-grid">' + g.opponents.map(function(opp){
    const p = Object.assign({}, opp, playerBySeat(s, opp.seat) || {});
    const isTurn = g.turn === p.seat;
    const cls = 'hand-row compact' + (p.active === false ? ' inactive' : (!p.present ? ' away' : '')) + (isTurn ? ' active' : '');
    var paceBtns = '';
    if(isTurn && pacing.canNudge) paceBtns += '<button class="pace-btn nudge" onclick="doNudge()">\ud83d\udc46 Nudge</button>';
    if(isTurn && pacing.canSkip) paceBtns += '<button class="pace-btn skip" onclick="doSkip()">Skip turn</button>';
    return '<div class="' + cls + '"><div class="hand-header">' +
      '<span class="player-name">' + escapeHtml(p.name) + '</span>' +
      '<span class="card-count">' + p.cardCount + ' card' + (p.cardCount === 1 ? '' : 's') + '</span>' +
      statusBadges(p) + paceBtns + '</div></div>';
  }).join('') + '</div>';
}
function renderPlayerGame(){
  const s = ui.srv, g = s.game;
  const yourTurn = g.yourTurn;
  const waitingName = g.waitingOn ? g.waitingOn.name : '';
  const banner = g.waitingOn ? (escapeHtml(waitingName) + ' is choosing...') : (yourTurn ? 'Your turn' : (escapeHtml(playerName(s, g.turn)) + "'s turn"));
  const direction = g.direction === -1 ? 'Reverse direction' : 'Forward direction';
  const handHtml = g.hand.map(function(c){
    const clickable = yourTurn && !g.choice && clientPlayable(g, c);
    const html = renderCard(c, clickable);
    return ui.glow.indexOf(c.id) !== -1 ? ('<span class="glow-wrap">' + html + '</span>') : html;
  }).join('');
  return (ui.status !== 'online' ? '<div class="reconnect-banner">Connection lost. Reconnecting...</div>' : '') +
    '<div class="game-header"><h1>No Mercy Synchro</h1><div class="header-btns">' +
    '<button onclick="doSynchro()">Synchro</button><button onclick="toggleGuide()">Guide</button><button onclick="leaveGame()">Step Away</button></div></div>' +
    renderDisplayRequests(s) +
    (g.youActive === false ? '<div class="bench-banner"><span>You\u2019re sitting out this hand.</span><button onclick="doImBack()">I\u2019m back!</button></div>' : '') +
    (ui.showGuide ? renderGuidePanel() : '') +
    '<div class="turn-banner">' + banner + '</div>' +
    '<div class="message-banner">' + direction + '</div>' +
    renderOpponentRows(s, g) +
    '<div class="table-zone"><div class="pile"><div class="card-back ' + (mustDraw(g) ? 'glow-draw' : '') + '" onclick="doDraw()">&#127946;</div><div class="pile-label">Draw</div></div>' +
    '<div class="pile">' + renderCard(g.discardTop, false) + '<div class="theme-badge ' + g.theme + '">' + THEME_LABELS[g.theme] + '</div></div></div>' +
    '<div class="message-banner">' + (mustDraw(g) ? 'No cards to play, tap the draw pile.' : '') + '</div>' +
    '<div class="hand-row active"><div class="hand-header">' +
    '<span class="player-name">' + escapeHtml(s.you.name) + ' (you)</span>' +
    '<span class="card-count">' + g.hand.length + ' card' + (g.hand.length === 1 ? '' : 's') + '</span>' +
    '</div><div class="hand-cards">' + handHtml + '</div></div>' +
    (g.choice ? renderChoiceModal(g) : '');
}
function renderDisplayPending(){
  const code = ui.srv && ui.srv.code ? ui.srv.code : '';
  return '<div class="start-screen"><h1>Shared Display</h1>' +
    (code ? '<p class="tagline">Request sent for room ' + escapeHtml(code) + '.</p>' : '<p class="tagline">Looking for the newest room...</p>') +
    '<p class="tagline">Waiting for the host to approve this screen.</p>' +
    '<button class="new-names-btn" onclick="leaveGame()">Cancel</button></div>';
}
function renderDisplayFinalHands(g){
  if(!g || !g.finalHands) return '';
  return '<div class="hand-cards">' + g.finalHands.map(function(h){
    return '<div class="hand-row"><div class="hand-header">' +
      '<span class="player-name">' + escapeHtml(h.name) + '</span>' +
      '<span class="card-count">' + h.cards.length + ' card' + (h.cards.length === 1 ? '' : 's') + '</span>' +
      '</div><div class="hand-cards">' + h.cards.map(function(c){ return renderCard(c, false); }).join('') + '</div></div>';
  }).join('') + '</div>';
}
function renderDisplayRematch(s){
  if(!s.rematch) return '';
  const rm = s.rematch;
  const label = rm.stage === 'deciding' ? 'Starting soon \u2014 who\u2019s in?' : 'Play again?';
  return '<div class="message-banner">' + label + '</div>' +
    '<div class="player-list">' + s.players.map(function(p){
      var status = !p.present ? 'away'
        : (rm.readySeats.indexOf(p.seat) !== -1 ? 'in \u2713'
        : (rm.waitingSeats.indexOf(p.seat) !== -1 ? 'hang on' : '\u2026'));
      return '<div class="player-chip"><span>' + escapeHtml(p.name) + (p.host ? ' \u2b50' : '') + '</span><small>' + status + '</small></div>';
    }).join('') + '</div>';
}
function renderSharedDisplay(){
  const s = ui.srv;
  if(!s || s.role === 'display-pending') return renderDisplayPending();
  const g = s.game;
  if(!g){
    return '<div class="display-screen"><div class="game-header"><h1>No Mercy Synchro</h1><div class="header-btns"><button onclick="leaveGame()">Leave</button></div></div>' +
      '<div class="turn-banner">Room ' + escapeHtml(s.code) + '</div>' +
      '<div class="display-roster">' + s.players.map(function(p){
        return '<div class="hand-row compact"><div class="hand-header"><span class="player-name">' + escapeHtml(p.name) + '</span>' + statusBadges(p) + '</div></div>';
      }).join('') + '</div></div>';
  }
  const headline = s.phase === 'over'
    ? (s.endedReason === 'opponent-left' ? 'Game ended' : (winnerName(s, g) + ' wins!'))
    : (g.waitingOn ? (escapeHtml(g.waitingOn.name) + ' is choosing...') : (escapeHtml(playerName(s, g.turn)) + "'s turn"));
  return '<div class="display-screen"><div class="game-header"><h1>No Mercy Synchro</h1><div class="header-btns"><button onclick="leaveGame()">Leave</button></div></div>' +
    '<div class="turn-banner">' + headline + '</div>' +
    (s.phase === 'over' ? renderDisplayRematch(s) : '') +
    '<div class="message-banner">' + (g.direction === -1 ? 'Reverse direction' : 'Forward direction') + '</div>' +
    '<div class="table-zone"><div class="pile"><div class="card-back static">&#127946;</div><div class="pile-label">Draw</div></div>' +
    '<div class="pile">' + renderCard(g.discardTop, false) + '<div class="theme-badge ' + g.theme + '">' + THEME_LABELS[g.theme] + '</div></div></div>' +
    '<div class="display-roster">' + g.players.map(function(publicPlayer){
      const p = Object.assign({}, publicPlayer, playerBySeat(s, publicPlayer.seat) || {});
      const cls = 'hand-row compact' + (p.active === false ? ' inactive' : (!p.present ? ' away' : '')) + (g.turn === p.seat ? ' active' : '');
      return '<div class="' + cls + '"><div class="hand-header"><span class="player-name">' + escapeHtml(p.name) + '</span>' +
        '<span class="card-count">' + p.cardCount + ' card' + (p.cardCount === 1 ? '' : 's') + '</span>' + statusBadges(p) + '</div></div>';
    }).join('') + '</div>' +
    (s.phase === 'over' ? renderDisplayFinalHands(g) : '') + '</div>';
}
function renderLoserHands(){
  const s = ui.srv, g = s.game;
  if(!g || !g.finalHands) return '';
  const losers = g.finalHands.filter(function(h){ return h.seat !== g.winner && h.cards.length; });
  if(!losers.length) return '';
  return losers.map(function(h){
    return '<div class="hand-row"><div class="hand-header">' +
      '<span class="player-name">' + escapeHtml(h.name) + '</span>' +
      '<span class="card-count">' + h.cards.length + ' card' + (h.cards.length === 1 ? '' : 's') + '</span>' +
      '</div><div class="hand-cards">' + h.cards.map(function(c){ return renderCard(c, false); }).join('') + '</div></div>';
  }).join('');
}
function toggleLoserHands(){ ui.showLosers = !ui.showLosers; render(); }
function renderGameOver(){
  const s = ui.srv, g = s.game;
  let headline, sub;
  if(s.endedReason === 'opponent-left'){
    headline = opponentName(s) + ' left the pool';
    sub = 'They dropped and did not make it back.';
  } else {
    const iWon = g && g.winner === s.you.seat;
    headline = iWon ? 'You win! 🏆' : (opponentName(s) + ' wins!');
    sub = 'No mercy, no regrets.';
  }
  const canReveal = g && g.finalHands && g.finalHands.some(function(h){ return h.seat !== g.winner && h.cards.length; });
  const loserLabel = (g && g.winner !== undefined && g.winner !== null)
    ? (g.finalHands ? (g.finalHands.filter(function(h){ return h.seat !== g.winner && h.cards.length; }).length > 1 ? 'everyone else' : opponentName(s)) : opponentName(s))
    : opponentName(s);
  return '<div class="gameover-screen"><div style="font-size:3rem;">🏆🩰🦪</div><h1>' + escapeHtml(headline) + '</h1>' +
    '<p class="tagline">' + sub + '</p>' +
    (ui.showLosers ? renderLoserHands() : '') +
    '<div class="gameover-btns">' +
    '<button class="play-again-btn" onclick="leaveGame()">Back to Start</button>' +
    (canReveal ? '<button class="new-names-btn" onclick="toggleLoserHands()">' + (ui.showLosers ? 'Hide' : 'See') + ' what ' + escapeHtml(loserLabel) + ' stuck with 👀</button>' : '') +
    '</div></div>';
}
function rematchStatusFor(s, p){
  const rm = s.rematch;
  if(!p.present) return 'away';
  if(rm.readySeats.indexOf(p.seat) !== -1) return 'in \u2713';
  if(rm.waitingSeats.indexOf(p.seat) !== -1) return 'hang on';
  return rm.stage === 'deciding' ? 'deciding\u2026' : '\u2026';
}
function renderRematchRoster(s){
  return '<div class="player-list">' + s.players.map(function(p){
    return '<div class="player-chip"><span>' + escapeHtml(p.name) + (p.host ? ' \u2b50' : '') + '</span><small>' +
      rematchStatusFor(s, p) + '</small></div>';
  }).join('') + '</div>';
}
function renderRematchControls(s){
  const rm = s.rematch;
  const btns = [], lines = [];
  if(rm.stage === 'proposing'){
    if(rm.youReady){
      lines.push('You\u2019re in! Waiting on the other swimmers.');
    } else {
      lines.push('Want another hand? Tap Play Again.');
      btns.push('<button class="play-again-btn" onclick="doRematchReady()">Play Again</button>');
    }
    if(rm.canPropose){
      lines.push('Ready when you are \u2014 kick off the next hand for everyone who\u2019s in.');
      btns.push('<button class="play-again-btn" onclick="doRematchPropose()">Ready to start?</button>');
    }
  } else {
    if(rm.youReady){
      lines.push('You\u2019re in! Waiting on the other swimmers.');
    } else if(rm.youWaiting){
      lines.push('Take your time \u2014 tap I\u2019m in when you\u2019re ready.');
      btns.push('<button class="play-again-btn" onclick="doRematchReady()">I\u2019m in!</button>');
    } else {
      lines.push('The host wants to go again. In?');
      btns.push('<button class="play-again-btn" onclick="doRematchReady()">I\u2019m in!</button>');
      btns.push('<button class="new-names-btn" onclick="doRematchWait()">Hang on</button>');
    }
    if(rm.canCommit){
      lines.push('Some swimmers are still deciding. Start now and they\u2019ll sit out until they tap back in.');
      btns.push('<button class="play-again-btn" onclick="doRematchCommit()">Start now</button>');
    }
  }
  return lines.map(function(l){ return '<p class="tagline">' + l + '</p>'; }).join('') +
    (btns.length ? '<div class="gameover-btns">' + btns.join('') + '</div>' : '');
}
function renderPlayerGameOver(){
  const s = ui.srv, g = s.game;
  let headline, sub;
  if(s.endedReason === 'opponent-left'){
    headline = 'Game ended';
    sub = 'Too many swimmers left the pool.';
  } else {
    const iWon = g && g.winner === s.you.seat;
    headline = iWon ? 'You win!' : (winnerName(s, g) + ' wins!');
    sub = 'No mercy, no regrets.';
  }
  const canReveal = g && g.finalHands && g.finalHands.some(function(h){ return h.seat !== g.winner && h.cards.length; });
  const loserCount = g && g.finalHands ? g.finalHands.filter(function(h){ return h.seat !== g.winner && h.cards.length; }).length : 0;
  const loserLabel = loserCount > 1 ? 'everyone else' : 'the other swimmer';
  const revealBtn = canReveal ? '<button class="new-names-btn" onclick="toggleLoserHands()">' + (ui.showLosers ? 'Hide' : 'See') + ' what ' + escapeHtml(loserLabel) + ' had left</button>' : '';
  const backBtn = '<button class="new-names-btn" onclick="leaveGame()">Back to Start</button>';
  const body = (s.rematch ? renderRematchRoster(s) + renderRematchControls(s) : '') +
    '<div class="gameover-btns">' + revealBtn + backBtn + '</div>';
  return '<div class="gameover-screen"><div style="font-size:3rem;">&#127942;</div><h1>' + escapeHtml(headline) + '</h1>' +
    '<p class="tagline">' + sub + '</p>' +
    (ui.showLosers ? renderLoserHands() : '') +
    body + '</div>';
}

/* ============ RENDER ============ */
function render(){
  const app = document.getElementById('app');
  const s = ui.srv;
  if(ui.paused && ui.identity){ app.innerHTML = renderPaused(); return; }
  if(ui.mode === 'display' || (s && (s.role === 'display' || s.role === 'display-pending'))){ app.innerHTML = renderSharedDisplay(); return; }
  if(!s){ app.innerHTML = (ui.status === 'online') ? renderHome() : renderConnecting(); return; }
  if(s.phase === 'lobby'){ app.innerHTML = renderWaiting(); return; }
  if(s.phase === 'over'){ app.innerHTML = renderPlayerGameOver(); return; }
  app.innerHTML = renderPlayerGame();
}

/* ============ BOOT ============ */
window.addEventListener('load', function(){
  ui.identity = loadSession();
  connect();
});
</script>
<footer class="credit" style="position:relative;z-index:1;">No Mercy Synchro - online, v3.3.0</footer>
</body>
